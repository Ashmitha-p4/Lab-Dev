name: CI Pipeline

# Trigger the workflow on push to master and on pull requests to master
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest  # Runs the job on the latest Ubuntu

    steps:
      # Step 1: Checkout the code from the repository
      - name: Checkout code
        uses: actions/checkout@v2

      # Step 2: Set up JDK 11 (using temurin distribution)
      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: '11'     # Set the Java version to 11
          distribution: 'temurin'  # Use Temurin (AdoptOpenJDK's successor)

      # Step 3: Build the project using Maven
      - name: Build with Maven
        run: mvn clean install

      # Step 4: Run the tests using Maven
      - name: Run tests
        run: mvn test