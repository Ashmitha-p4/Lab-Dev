name: CI Pipeline

on:
  push:
    branches:
      - master  # This will trigger the workflow on push to the 'master' branch
  pull_request:
    branches:
      - master  # This will trigger the workflow on pull requests to the 'master' branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: '11'

      - name: Build with Maven
        run: mvn clean install

      - name: Run tests
        run: mvn test